<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Contractor</title>
    <style>
      :root { color-scheme: dark; font-family: "Segoe UI", Arial, sans-serif; }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #101116;
      }
      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        background: #171923;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" aria-label="Dragon Contractor canvas game"></canvas>

    <script src="./src/contract-creation.js"></script>
    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const Creation = window.ContractCreation;

      const CONFIG = {
        app: {
          width: 1280,
          height: 720,
          fullCircleRadians: Math.PI * 2
        },
        types: ["Damage", "Burst", "Heal", "Energy", "Buff", "Curse", "Vitality"],
        typeColors: {
          Damage: "#f0a15f",
          Burst: "#7fd3ff",
          Heal: "#72c27a",
          Energy: "#4ea6c8",
          Buff: "#e8dca8",
          Curse: "#9b6ad6",
          Vitality: "#d78b5f"
        },
        dragons: ["Ignivar", "Voltaris", "Mirava", "Zephra", "Orvyn", "Noxar", "Vorn"],
        traits: ["Fierce", "Ancient", "Swift", "Sealed", "Wild", "Bright", "Grim"],
        powers: {
          Damage: ["Flame Bite", "Iron Talon", "Ash Fang"],
          Burst: ["Thunder Crash", "Meteor Crown", "Rift Roar"],
          Heal: ["Life Ember", "Mending Breath", "Green Oath"],
          Energy: ["Mana Breath", "Spark Flow", "Azure Coil"],
          Buff: ["Dragon Oath", "War Verse", "Crown Mark"],
          Curse: ["Chain Hex", "Shadow Brand", "Dread Seal"],
          Vitality: ["Blood Crown", "Heart Bulwark", "Golden Scale"]
        },
        base: {
          Damage: { effect: 12, cost: 10, text: "Damage" },
          Burst: { effect: 28, cost: 30, text: "Damage" },
          Heal: { effect: 24, cost: 25, text: "Heal" },
          Energy: { effect: 30, cost: 0, text: "Energy" },
          Buff: { effect: 30, cost: 20, text: "Next contract +30%" },
          Curse: { effect: 30, cost: 20, text: "Enemy next contract -30%" },
          Vitality: { effect: 50, cost: 25, text: "Max HP" }
        },
        starterContracts: [
          {
            id: "starter-ember",
            dragon: "Ignivar",
            trait: "Faint",
            power: "Ember Tap",
            type: "Damage",
            grade: "Rough",
            value: 8,
            cost: 8,
            callName: "Ember",
            cooldown: 2
          },
          {
            id: "starter-mend",
            dragon: "Mirava",
            trait: "Faint",
            power: "Mending Spark",
            type: "Heal",
            grade: "Rough",
            value: 12,
            cost: 18,
            callName: "Mend",
            cooldown: 2.5
          },
          {
            id: "starter-spark",
            dragon: "Voltaris",
            trait: "Faint",
            power: "Quiet Spark",
            type: "Energy",
            grade: "Rough",
            value: 15,
            cost: 0,
            callName: "Spark",
            cooldown: 3
          }
        ],
        creation: {
          defaultMode: "chaos",
          modes: {
            chaos: { label: "Chaos Contract Creation", shortLabel: "Chaos" },
            order: { label: "Order Contract Creation", shortLabel: "Order" },
            balance: { label: "Balance Contract Creation", shortLabel: "Balance" }
          },
          minimumAnalysisPoints: 2,
          modeButtons: { x: 70, y: 146, width: 156, height: 38, gap: 12 },
          typeButtons: { x: 70, firstY: 220, secondY: 260, width: 112, height: 34, gap: 14, columns: 4 },
          labels: { modeTitleY: 126, typeTitleY: 204, drawingTitleY: 316, statusY: 238 },
          actions: { y: 590, analyzeX: 70, redrawX: 194, dashX: 318, breakX: 462, width: 112, height: 38 },
          circle: { center: { x: 326, y: 448 }, radius: 118, borderWidth: 2 },
          order: {
            pointCount: 8,
            center: { x: 326, y: 448 },
            radius: 104,
            startAngle: -Math.PI / 2,
            pointRadius: 13,
            hitRadius: 24,
            edgeWidth: 3,
            labelSize: 11
          },
          balance: {
            center: { x: 326, y: 448 },
            axisOffset: 0,
            dedupeTolerance: 0.5,
            axisLineLength: 112,
            axisLineWidth: 1,
            axesByType: {
              Damage: 1,
              Burst: 2,
              Heal: 2,
              Energy: 3,
              Buff: 3,
              Curse: 4,
              Vitality: 4
            }
          },
          drawingRules: {
            dashPattern: [10, 8],
            guideDashPattern: [4, 6],
            continuousLineBonus: 4,
            disconnectedSegmentCost: 4,
            strokeBreakPenalty: 2,
            strokeBreakEffectPenalty: 0.01
          },
          analysis: {
            shapePointTolerance: 8,
            overlapTolerance: 4,
            endpointTolerance: 4,
            intersectionEpsilon: 0.0001,
            outerTargetLength: Math.PI * 2 * 118,
            outlineCompletionMax: 1,
            openOutlineFactor: 0.4,
            maxOpenOutlineCompletion: 0.55,
            outerShapeThreshold: 0.72,
            multiplierFloor: 0,
            effectivenessBase: 1,
            effectivenessMin: 0.8,
            effectivenessMax: 1.2,
            innerShapeBonus: 0.05,
            crossingPenalty: 0.05,
            overlapPenalty: 0.02,
            breaksForgivenPerInnerShape: 1,
            strengthBase: 1,
            strengthPerLength: 0.00045,
            maxStrengthBonus: 0.35,
            minimumValue: 1,
            manaPerLength: 0.012,
            manaPerStroke: 1.5,
            outerOutlineManaDiscount: 8,
            minimumManaCost: 0,
            gradeThresholds: { perfect: 1.15, strong: 1.05, stable: 0.92 },
            traitCrossingThreshold: 2,
            traitOutlineThreshold: 0.72
          }
        },
        drawRect: { x: 70, y: 326, w: 512, h: 244 },
        analysisRect: { x: 636, y: 150, w: 570, h: 440 },
        guideRect: { x: 1126, y: 30, w: 92, h: 42 }
      };

      const W = CONFIG.app.width;
      const H = CONFIG.app.height;
      const TAU = CONFIG.app.fullCircleRadians;
      const keys = new Set();

      function createStarterContracts() {
        return CONFIG.starterContracts.map((contract) => ({
          ...contract,
          callWords: [contract.dragon, contract.trait, ...contract.power.split(" ")],
          cooldownLeft: 0,
          sigil: [],
          why: "Starter contract with intentionally weak fixed stats.",
          isStarter: true
        }));
      }

      const game = {
        screen: "loadout",
        previousScreen: "loadout",
        guideOpen: false,
        message: "Choose contracts for battle or create a new contract.",
        selectedType: "Damage",
        creationMode: CONFIG.creation.defaultMode,
        dashedDrawing: false,
        strokes: [],
        activeStroke: null,
        activeStrokes: [],
        analysis: null,
        analysisOverlayOpen: false,
        orderPoints: Creation.createOrderPoints(CONFIG.creation.order, CONFIG.types),
        orderState: null,
        library: createStarterContracts(),
        loadout: [...CONFIG.starterContracts.map((contract) => contract.id), null],
        selectedContractId: CONFIG.starterContracts[0].id,
        callRoll: 0,
        combat: null,
        particles: [],
        buttons: []
      };

      game.orderState = {
        strokes: game.strokes,
        edges: new Set(),
        currentStrokeIndex: null,
        lastPointIndex: null,
        firstPointIndex: null
      };

      function fitCanvas() {
        canvas.width = W;
        canvas.height = H;
        const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
        canvas.style.width = `${W * scale}px`;
        canvas.style.height = `${H * scale}px`;
      }

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left) * (W / rect.width),
          y: (event.clientY - rect.top) * (H / rect.height)
        };
      }

      function inRect(point, rect) {
        return point.x >= rect.x && point.x <= rect.x + rect.w && point.y >= rect.y && point.y <= rect.y + rect.h;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function pick(list, salt = 0) {
        return list[(Math.floor(Math.random() * list.length) + salt) % list.length];
      }

      function resetCreationDrawing() {
        game.strokes = [];
        game.activeStroke = null;
        game.activeStrokes = [];
        game.analysis = null;
        game.orderState = {
          strokes: game.strokes,
          edges: new Set(),
          currentStrokeIndex: null,
          lastPointIndex: null,
          firstPointIndex: null
        };
      }

      function selectCreationMode(mode, random = Math.random) {
        if (!CONFIG.creation.modes[mode]) return false;
        game.creationMode = mode;
        resetCreationDrawing();
        if (mode === "chaos") game.selectedType = CONFIG.types[Math.floor(random() * CONFIG.types.length)];
        if (mode === "order") game.orderPoints = Creation.createOrderPoints(CONFIG.creation.order, CONFIG.types, random);
        game.message = `${CONFIG.creation.modes[mode].label} selected.`;
        return true;
      }

      function creationCircleContains(point) {
        const circle = CONFIG.creation.circle;
        return Math.hypot(point.x - circle.center.x, point.y - circle.center.y) <= circle.radius;
      }

      function balancePointConfig() {
        return {
          ...CONFIG.creation.balance,
          axes: CONFIG.creation.balance.axesByType[game.selectedType]
        };
      }

      function beginCreationStroke(point) {
        if (game.creationMode === "order" || !creationCircleContains(point)) return false;
        const points = game.creationMode === "balance" ? Creation.mirrorPointSet(point, balancePointConfig()) : [point];
        game.activeStrokes = points.map((mirrored) => {
          const stroke = [{ x: mirrored.x, y: mirrored.y }];
          game.strokes.push(stroke);
          return stroke;
        });
        game.activeStroke = game.activeStrokes[0] || null;
        game.analysis = null;
        return true;
      }

      function continueCreationStroke(point) {
        if (!game.activeStrokes.length || !creationCircleContains(point)) return false;
        const points = game.creationMode === "balance" ? Creation.mirrorPointSet(point, balancePointConfig()) : [point];
        points.forEach((mirrored, index) => {
          if (game.activeStrokes[index]) game.activeStrokes[index].push({ x: mirrored.x, y: mirrored.y });
        });
        game.analysis = null;
        return true;
      }

      function endCreationStroke() {
        game.activeStroke = null;
        game.activeStrokes = [];
      }

      function selectOrderPoint(pointIndex) {
        if (game.creationMode !== "order") return false;
        const firstSelection = game.orderState.firstPointIndex === null;
        const result = Creation.addOrderPoint(game.orderState, pointIndex, game.orderPoints);
        if (!result.accepted) {
          game.message = result.reason;
          return false;
        }
        if (firstSelection) {
          game.orderState.firstPointIndex = pointIndex;
          game.selectedType = result.type;
        }
        game.analysis = null;
        game.message = result.first ? `${result.type} mark starts this path.` : "Order edge added.";
        return true;
      }

      function breakOrderStroke() {
        Creation.breakOrderPath(game.orderState);
        game.message = "Path broken. The next point starts a disconnected stroke with a mana penalty.";
      }

      function sharedAnalysisConfig() {
        return { ...CONFIG.creation.analysis, ...CONFIG.creation.drawingRules };
      }

      function analyzeCurrentDrawing() {
        const allowed = game.screen === "create" || (game.screen === "loadout" && game.analysisOverlayOpen);
        if (!allowed) return null;
        return Creation.analyzeDrawing(
          game.strokes,
          CONFIG.base[game.selectedType],
          sharedAnalysisConfig(),
          { dashed: game.dashedDrawing }
        );
      }

      function makeAnalysis() {
        const allowed = game.screen === "create" || (game.screen === "loadout" && game.analysisOverlayOpen);
        if (!allowed) return;
        const points = game.strokes.flat();
        if (points.length < CONFIG.creation.minimumAnalysisPoints) {
          game.analysis = null;
          game.message = "Add at least two drawing points before analysis.";
          return;
        }
        const shared = analyzeCurrentDrawing();
        if (!shared) return;
        const thresholds = CONFIG.creation.analysis.gradeThresholds;
        const grade = shared.effectiveness >= thresholds.perfect ? "Perfect"
          : shared.effectiveness >= thresholds.strong ? "Strong"
            : shared.effectiveness >= thresholds.stable ? "Stable" : "Rough";
        const trait = shared.metrics.innerCompletedShapes > 0 ? "Sealed"
          : shared.metrics.crossings >= CONFIG.creation.analysis.traitCrossingThreshold ? "Wild"
            : shared.metrics.outerOutlineCompletion >= CONFIG.creation.analysis.traitOutlineThreshold ? "Ancient" : "Swift";
        const type = game.selectedType;
        const dragon = type === "Vitality" ? "Vorn" : pick(CONFIG.dragons);
        const power = pick(CONFIG.powers[type]);
        const callWords = [dragon, trait, ...power.split(" ")].filter((word) => !CONFIG.types.includes(word));
        const callName = callWords[game.callRoll % callWords.length];

        game.analysis = {
          id: `contract-${Date.now()}-${Math.floor(Math.random() * 9999)}`,
          dragon,
          trait,
          power,
          type,
          grade,
          mode: game.creationMode,
          value: shared.value,
          cost: shared.cost,
          effectiveness: shared.effectiveness,
          metrics: shared.metrics,
          callWords,
          callName,
          cooldown: 1.5,
          sigil: game.strokes.map((stroke) => stroke.map((p) => ({ x: p.x, y: p.y }))),
          dashed: game.dashedDrawing,
          why: `${grade} ${trait.toLowerCase()} sigil: ${Math.round(shared.effectiveness * 100)}% effective, ${shared.metrics.strokeCount} stroke(s).`
        };
        game.message = "Contract analysis ready. Save it or reroll the Call Name.";
      }

      function saveContract() {
        if (!game.analysis) {
          makeAnalysis();
          return;
        }
        const saved = { ...game.analysis, cooldownLeft: 0 };
        game.library.push(saved);
        game.selectedContractId = saved.id;
        const empty = game.loadout.findIndex((id) => !id);
        game.loadout[empty === -1 ? 0 : empty] = saved.id;
        resetCreationDrawing();
        game.callRoll = 0;
        game.message = "Contract saved. Entering combat.";
        startCombat();
      }

      function autoFillLoadout() {
        for (let i = 0; i < game.loadout.length; i += 1) {
          if (game.loadout[i]) continue;
          const available = game.library.find((contract) => !game.loadout.includes(contract.id));
          if (available) game.loadout[i] = available.id;
        }
      }

      function equippedContracts() {
        return game.loadout.map((id) => game.library.find((contract) => contract.id === id) || null);
      }

      function openCreateContract() {
        game.screen = "create";
        selectCreationMode(CONFIG.creation.defaultMode);
        game.message = "Choose a creation mode, draw a sigil, then analyze it.";
      }

      function equipContract(id) {
        if (!game.library.some((contract) => contract.id === id)) return false;
        game.selectedContractId = id;
        const empty = game.loadout.findIndex((contractId) => !contractId);
        game.loadout[empty === -1 ? 0 : empty] = id;
        const contract = game.library.find((item) => item.id === id);
        game.message = `${fullName(contract)} equipped.`;
        return true;
      }

      function deleteContract(id) {
        const index = game.library.findIndex((contract) => contract.id === id);
        if (index === -1) return false;
        const [deleted] = game.library.splice(index, 1);
        game.loadout = game.loadout.map((contractId) => contractId === id ? null : contractId);
        if (game.selectedContractId === id) game.selectedContractId = game.library[0]?.id || null;
        game.message = `${fullName(deleted)} deleted.`;
        return true;
      }

      function endGame() {
        game.screen = "loadout";
        game.combat = null;
        game.message = "Match ended. Adjust your loadout or create another contract.";
      }

      function startCombat() {
        autoFillLoadout();
        if (equippedContracts().every((contract) => !contract)) {
          openCreateContract();
          game.message = "Create and save at least one contract before combat.";
          return;
        }
        game.screen = "combat";
        game.combat = {
          timer: 60,
          player: { hp: 200, hpMax: 200, energy: 100, buff: 0, vitality: 0 },
          enemy: { hp: 200, hpMax: 200, energy: 100, curse: 0 },
          aiTimer: 1.5,
          latestPlayer: "None",
          latestEnemy: "Waiting",
          result: null
        };
        game.library.forEach((contract) => {
          contract.cooldownLeft = 0;
        });
        game.message = "Combat started. Use 1-4 to invoke Call Names.";
      }

      function castSlot(index) {
        if (game.screen !== "combat" || !game.combat || game.combat.result) return;
        const contract = equippedContracts()[index];
        if (!contract) {
          game.message = "Empty slot.";
          return;
        }
        invokeContract(contract, "player");
      }

      function invokeContract(contract, actor) {
        const c = game.combat;
        const source = actor === "player" ? c.player : c.enemy;
        const target = actor === "player" ? c.enemy : c.player;
        if (contract.cooldownLeft > 0) {
          if (actor === "player") game.message = "Contract Cooldown.";
          return;
        }
        if (source.energy < contract.cost) {
          if (actor === "player") game.message = "Not Enough Energy.";
          return;
        }

        source.energy -= contract.cost;
        contract.cooldownLeft = contract.cooldown;
        let value = contract.value;
        if (source.buff > 0 && contract.type !== "Buff") {
          value = Math.round(value * 1.3);
          source.buff -= 1;
        }
        if (target.curse > 0 && ["Damage", "Burst"].includes(contract.type)) {
          value = Math.round(value * 0.7);
          target.curse -= 1;
        }
        value = Math.min(value, contract.type === "Burst" ? 40 : value);

        if (contract.type === "Damage" || contract.type === "Burst") target.hp = clamp(target.hp - value, 0, target.hpMax);
        if (contract.type === "Heal") source.hp = clamp(source.hp + value, 0, source.hpMax);
        if (contract.type === "Energy") source.energy = clamp(source.energy + value, 0, 100);
        if (contract.type === "Buff") source.buff = 2;
        if (contract.type === "Curse") target.curse = 1;
        if (contract.type === "Vitality") {
          source.hpMax = clamp(200 + value, 200, 300);
          source.hp = clamp(source.hp + value, 0, source.hpMax);
          source.vitality = 8;
        }

        addSigilFlash(contract, actor);
        const line = `${contract.callName}: ${contract.type}`;
        if (actor === "player") c.latestPlayer = line;
        else c.latestEnemy = line;
        game.message = actor === "player" ? `You invoked ${line}.` : `Enemy invoked ${line}.`;
        chooseResult();
      }

      function addSigilFlash(contract, actor) {
        const x = actor === "player" ? 320 : 930;
        const y = 350;
        game.particles.push({ kind: "sigil", x, y, life: 0.55, color: CONFIG.typeColors[contract.type], sigil: contract.sigil, dashed: contract.dashed });
      }

      function update(dt) {
        for (const particle of game.particles) particle.life -= dt;
        game.particles = game.particles.filter((particle) => particle.life > 0);
        if (game.screen !== "combat" || !game.combat || game.guideOpen || game.combat.result) return;

        const c = game.combat;
        c.timer = Math.max(0, c.timer - dt);
        c.player.energy = clamp(c.player.energy + 10 * dt, 0, 100);
        c.enemy.energy = clamp(c.enemy.energy + 8 * dt, 0, 100);
        for (const contract of game.library) contract.cooldownLeft = Math.max(0, contract.cooldownLeft - dt);

        if (c.player.vitality > 0) {
          c.player.vitality -= dt;
          if (c.player.vitality <= 0) {
            c.player.hpMax = 200;
            c.player.hp = clamp(c.player.hp, 0, 200);
          }
        }

        c.aiTimer -= dt;
        if (c.aiTimer <= 0) {
          c.aiTimer = 1.4 + Math.random() * 1.1;
          const options = equippedContracts().filter((contract) => contract && contract.cooldownLeft <= 0 && c.enemy.energy >= contract.cost);
          if (options.length) invokeContract(pick(options), "enemy");
        }
        chooseResult();
      }

      function chooseResult() {
        const c = game.combat;
        if (!c || c.result) return;
        if (c.player.hp <= 0 && c.enemy.hp <= 0) c.result = "Draw";
        else if (c.enemy.hp <= 0) c.result = "Win";
        else if (c.player.hp <= 0) c.result = "Lose";
        else if (c.timer <= 0) c.result = c.player.hp === c.enemy.hp ? "Draw" : c.player.hp > c.enemy.hp ? "Win" : "Lose";
        if (c.result) game.message = `Result: ${c.result}. End the game to return to Loadout.`;
      }

      function draw() {
        game.buttons = [];
        drawBackground();
        drawTopBar();
        if (game.screen === "create") drawCreation();
        if (game.screen === "loadout") drawLoadout();
        if (game.screen === "combat") drawCombat();
        drawParticles();
        drawMessage();
        if (game.guideOpen) drawGuide();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, W, H);
        gradient.addColorStop(0, "#171923");
        gradient.addColorStop(0.56, "#20262a");
        gradient.addColorStop(1, "#281d22");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = "rgba(232, 220, 168, 0.07)";
        for (let x = -100; x < W; x += 48) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + 130, H);
          ctx.stroke();
        }
      }

      function drawTopBar() {
        ctx.fillStyle = "rgba(35, 38, 45, 0.92)";
        roundRect(32, 22, 1216, 72, 8, true, false);
        ctx.strokeStyle = "#68707a";
        roundRect(32, 22, 1216, 72, 8, false, true);
        drawText("Dragon Contractor", 58, 42, 30, "#f3f4ea", "left", "700");
        drawText(`Phase: ${phaseName()}`, 58, 72, 14, "#b8c0b0");
        button("Loadout", 660, 38, 112, 40, () => { autoFillLoadout(); game.screen = "loadout"; });
        button("Create Contract", 786, 38, 146, 40, openCreateContract);
        button("Combat", 946, 38, 112, 40, startCombat);
        button("Guide", CONFIG.guideRect.x, CONFIG.guideRect.y, CONFIG.guideRect.w, CONFIG.guideRect.h, () => {
          game.guideOpen = true;
          game.previousScreen = game.screen;
        });
      }

      function phaseName() {
        if (game.screen === "create") return "Contract Creation";
        if (game.screen === "loadout") return "Loadout Preparation";
        return "Combat";
      }

      function drawCreation() {
        const creation = CONFIG.creation;
        drawText("1. Creation Mode", creation.modeButtons.x, creation.labels.modeTitleY, 22, "#f3f4ea", "left", "700");
        Object.entries(creation.modes).forEach(([mode, details], index) => {
          const x = creation.modeButtons.x + index * (creation.modeButtons.width + creation.modeButtons.gap);
          button(details.shortLabel, x, creation.modeButtons.y, creation.modeButtons.width, creation.modeButtons.height, () => selectCreationMode(mode), mode === game.creationMode ? "#5fb3a1" : "#2e323b");
        });

        if (game.creationMode === "balance") {
          drawText("2. Contract Type / Symmetry Mark", creation.typeButtons.x, creation.labels.typeTitleY, 18, "#f3f4ea", "left", "700");
          CONFIG.types.forEach((type, index) => {
            const column = index % creation.typeButtons.columns;
            const x = creation.typeButtons.x + column * (creation.typeButtons.width + creation.typeButtons.gap);
            const y = index < creation.typeButtons.columns ? creation.typeButtons.firstY : creation.typeButtons.secondY;
            button(type, x, y, creation.typeButtons.width, creation.typeButtons.height, () => {
              game.selectedType = type;
              resetCreationDrawing();
              game.message = `${type} selected with ${creation.balance.axesByType[type]} symmetry axis/axes.`;
            }, type === game.selectedType ? CONFIG.typeColors[type] : "#2e323b");
          });
        } else {
          const status = game.creationMode === "chaos"
            ? `2. Random Contract Type: ${game.selectedType}`
            : `2. First Point Type: ${game.orderState.firstPointIndex === null ? "Choose a point" : game.selectedType}`;
          drawText(status, creation.typeButtons.x, creation.labels.typeTitleY, 18, CONFIG.typeColors[game.selectedType], "left", "700");
          drawText(creation.modes[game.creationMode].label, creation.typeButtons.x, creation.labels.statusY, 15, "#b8c0b0");
        }

        drawText("3. Draw Sigil", CONFIG.drawRect.x, creation.labels.drawingTitleY, 20, "#f3f4ea", "left", "700");
        drawCreationSurface();

        button("Analyze", creation.actions.analyzeX, creation.actions.y, creation.actions.width, creation.actions.height, makeAnalysis);
        button("Redraw", creation.actions.redrawX, creation.actions.y, creation.actions.width, creation.actions.height, () => {
          resetCreationDrawing();
          game.message = "Drawing cleared.";
        });
        button(game.dashedDrawing ? "Dashed On" : "Dashed Off", creation.actions.dashX, creation.actions.y, creation.actions.width, creation.actions.height, () => {
          game.dashedDrawing = !game.dashedDrawing;
          game.analysis = null;
          game.message = game.dashedDrawing ? "Dashed drawing enabled." : "Solid drawing enabled.";
        });
        if (game.creationMode === "order") button("Break Path", creation.actions.breakX, creation.actions.y, creation.actions.width, creation.actions.height, breakOrderStroke);
        drawAnalysisPanel();
      }

      function drawCreationSurface() {
        const creation = CONFIG.creation;
        const circle = creation.circle;
        ctx.fillStyle = "#12141a";
        ctx.beginPath();
        ctx.arc(circle.center.x, circle.center.y, circle.radius, 0, TAU);
        ctx.fill();
        ctx.strokeStyle = CONFIG.typeColors[game.selectedType];
        ctx.lineWidth = circle.borderWidth;
        ctx.stroke();

        if (game.creationMode === "balance") drawSymmetryAxes();
        if (!game.strokes.length) {
          const instruction = game.creationMode === "order" ? "Select points to connect the marked octagon" : "Draw inside the circle";
          drawText(instruction, circle.center.x, circle.center.y, 16, "#68707a", "center");
        }
        const strokeWidth = game.creationMode === "order" ? creation.order.edgeWidth : null;
        drawStoredSigil(game.strokes, 0, 0, 1, CONFIG.typeColors[game.selectedType], 1, game.dashedDrawing, strokeWidth);
        if (game.creationMode === "order") drawOrderPoints();
      }

      function drawSymmetryAxes() {
        const balance = balancePointConfig();
        const dash = CONFIG.creation.drawingRules.guideDashPattern;
        ctx.save();
        ctx.strokeStyle = "#68707a";
        ctx.lineWidth = balance.axisLineWidth;
        ctx.setLineDash(dash);
        for (let axis = 0; axis < balance.axes; axis += 1) {
          const angle = balance.axisOffset + axis * Math.PI / balance.axes;
          const dx = Math.cos(angle) * balance.axisLineLength;
          const dy = Math.sin(angle) * balance.axisLineLength;
          ctx.beginPath();
          ctx.moveTo(balance.center.x - dx, balance.center.y - dy);
          ctx.lineTo(balance.center.x + dx, balance.center.y + dy);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawOrderPoints() {
        const order = CONFIG.creation.order;
        game.orderPoints.forEach((point) => {
          ctx.fillStyle = CONFIG.typeColors[point.type];
          ctx.beginPath();
          ctx.arc(point.x, point.y, order.pointRadius, 0, TAU);
          ctx.fill();
          drawText(point.type, point.x, point.y - order.pointRadius - order.labelSize, order.labelSize, CONFIG.typeColors[point.type], "center", "700");
        });
      }

      function drawAnalysisPanel() {
        const r = CONFIG.analysisRect;
        ctx.fillStyle = "rgba(35, 38, 45, 0.94)";
        roundRect(r.x, r.y, r.w, r.h, 8, true, false);
        ctx.strokeStyle = "#68707a";
        roundRect(r.x, r.y, r.w, r.h, 8, false, true);
        drawText("4. Contract Analysis", r.x + 28, r.y + 34, 28, "#f3f4ea", "left", "700");
        if (!game.analysis) {
          drawText("No analysis yet.", r.x + 28, r.y + 94, 20, "#b8c0b0");
          drawText("Choose a mode, draw a mark, then press Analyze.", r.x + 28, r.y + 126, 17, "#b8c0b0");
          return;
        }
        const a = game.analysis;
        const y = r.y + 82;
        drawText(`${a.dragon} - ${a.trait} - ${a.power}`, r.x + 28, y, 23, "#f3f4ea", "left", "700");
        drawText("Contract Call:", r.x + 28, y + 42, 17, "#e8dca8", "left", "700");
        drawText(`[${a.callName}]`, r.x + 178, y + 39, 23, CONFIG.typeColors[a.type], "left", "700");
        button("Reroll", r.x + 388, y + 24, 112, 38, () => {
          game.callRoll += 1;
          makeAnalysis();
        });
        drawText(`Effect: ${effectText(a)}`, r.x + 28, y + 88, 19, "#f3f4ea");
        drawText(`Mana Cost: ${a.cost}`, r.x + 28, y + 118, 19, "#f3f4ea");
        drawText(`Effectiveness: ${Math.round(a.effectiveness * 100)}% | Grade: ${a.grade}`, r.x + 28, y + 148, 18, "#f3f4ea");
        drawText(`Length ${Math.round(a.metrics.totalDrawingLength)} | Strokes ${a.metrics.strokeCount} | Breaks ${a.metrics.strokeBreaks}`, r.x + 28, y + 180, 15, "#b8c0b0");
        drawText(`Outline ${Math.round(a.metrics.outerOutlineCompletion * 100)}% | Shapes ${a.metrics.innerCompletedShapes} | Crossings ${a.metrics.crossings} | Overlaps ${a.metrics.overlaps}`, r.x + 28, y + 206, 15, "#b8c0b0");
        button("Save & Combat", r.x + 28, r.y + r.h - 66, 170, 44, saveContract, "#5fb3a1");
        button("Cancel", r.x + 216, r.y + r.h - 66, 154, 44, () => { game.screen = "loadout"; });
      }

      function drawLoadout() {
        drawText("Contract Library", 70, 132, 28, "#f3f4ea", "left", "700");
        if (!game.library.length) {
          drawText("No contracts yet. Create one to continue to combat.", 70, 190, 20, "#b8c0b0");
          button("Create Contract", 70, 230, 184, 44, openCreateContract, "#5fb3a1");
        }
        game.library.forEach((contract, index) => {
          const x = 70;
          const y = 180 + index * 76;
          contractCard(contract, x, y, 456, 62);
          button(contract.id === game.selectedContractId ? "Selected" : "Equip", 540, y + 10, 82, 38, () => equipContract(contract.id));
          button("Delete", 634, y + 10, 96, 38, () => deleteContract(contract.id), "#8c4355");
        });

        if (game.library.length) button("Create Contract", 70, 582, 184, 44, openCreateContract, "#5fb3a1");

        drawText("Battle Slots", 760, 132, 28, "#f3f4ea", "left", "700");
        equippedContracts().forEach((contract, index) => {
          const y = 180 + index * 92;
          ctx.fillStyle = "rgba(35, 38, 45, 0.94)";
          roundRect(760, y, 410, 72, 8, true, false);
          ctx.strokeStyle = contract ? CONFIG.typeColors[contract.type] : "#68707a";
          roundRect(760, y, 410, 72, 8, false, true);
          drawText(`[${index + 1}]`, 784, y + 28, 22, "#e8dca8", "left", "700");
          if (contract) {
            drawText(contract.callName, 840, y + 18, 26, "#f3f4ea", "left", "700");
            drawText(`${contract.type} | ${effectText(contract)} | ${contract.cost} Energy`, 840, y + 48, 15, "#b8c0b0");
          } else {
            drawText("Empty Slot", 840, y + 28, 20, "#68707a");
          }
          button("Clear", 1084, y + 18, 68, 36, () => { game.loadout[index] = null; });
        });
        button("Start Combat", 946, 582, 224, 54, startCombat, "#5fb3a1");
      }

      function drawCombat() {
        const c = game.combat;
        if (!c) {
          startCombat();
          return;
        }
        drawText("Contract Duel", 70, 128, 28, "#f3f4ea", "left", "700");
        drawCombatant("Contractor", 88, 172, c.player, "#5fb3a1");
        drawCombatant("Enemy", 844, 172, c.enemy, "#d78b5f");
        drawText(Math.ceil(c.timer).toString(), W / 2, 150, 52, "#f3f4ea", "center", "700");
        drawScrollContractor(290, 352);
        drawEnemyDragon(940, 348);

        drawText(`Latest Player Call: ${c.latestPlayer}`, 70, 500, 18, "#b8c0b0");
        drawText(`Latest Enemy Call: ${c.latestEnemy}`, 782, 500, 18, "#b8c0b0");
        equippedContracts().forEach((contract, index) => {
          const x = 70 + index * 300;
          const y = 558;
          ctx.fillStyle = "rgba(35, 38, 45, 0.96)";
          roundRect(x, y, 260, 74, 8, true, false);
          ctx.strokeStyle = contract ? CONFIG.typeColors[contract.type] : "#68707a";
          roundRect(x, y, 260, 74, 8, false, true);
          if (contract) {
            drawText(`[${index + 1}] ${contract.callName}`, x + 18, y + 28, 23, "#f3f4ea", "left", "700");
            drawText(`${contract.type} | ${contract.cost} Energy`, x + 18, y + 55, 14, "#b8c0b0");
            if (contract.cooldownLeft > 0) {
              ctx.fillStyle = "rgba(5, 7, 10, 0.62)";
              roundRect(x, y, 260 * (contract.cooldownLeft / contract.cooldown), 74, 8, true, false);
              drawText(contract.cooldownLeft.toFixed(1), x + 226, y + 44, 18, "#e8dca8", "center", "700");
            }
          } else {
            drawText(`[${index + 1}] Empty`, x + 18, y + 42, 20, "#68707a");
          }
        });
        if (c.result) drawResult(c.result);
      }

      function drawCombatant(label, x, y, actor, color) {
        drawText(label, x, y, 18, "#f3f4ea", "left", "700");
        bar(x, y + 18, 330, 22, actor.hp / actor.hpMax, "#c94f5d");
        bar(x, y + 52, 330, 16, actor.energy / 100, "#4ea6c8");
        drawText(`${Math.ceil(actor.hp)}/${actor.hpMax} HP`, x + 342, y + 36, 15, color);
        drawText(`${Math.floor(actor.energy)} Energy`, x + 342, y + 70, 15, "#b8c0b0");
      }

      function drawScrollContractor(x, y) {
        ctx.fillStyle = "#e8dca8";
        ctx.beginPath();
        ctx.arc(x, y - 54, 22, 0, TAU);
        ctx.fill();
        ctx.fillStyle = "#2e323b";
        ctx.beginPath();
        ctx.moveTo(x, y - 30);
        ctx.lineTo(x - 50, y + 82);
        ctx.lineTo(x + 48, y + 82);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#d8c48d";
        roundRect(x + 24, y - 4, 82, 34, 5, true, false);
        ctx.strokeStyle = "#d78b5f";
        roundRect(x + 24, y - 4, 82, 34, 5, false, true);
      }

      function drawEnemyDragon(x, y) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "#8c4355";
        ctx.beginPath();
        ctx.moveTo(-80, 22);
        ctx.quadraticCurveTo(-30, -88, 66, -32);
        ctx.quadraticCurveTo(112, 8, 70, 70);
        ctx.quadraticCurveTo(0, 92, -80, 22);
        ctx.fill();
        ctx.fillStyle = "#f3f4ea";
        ctx.beginPath();
        ctx.arc(42, -18, 7, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      function drawResult(result) {
        ctx.fillStyle = "rgba(5, 7, 10, 0.78)";
        ctx.fillRect(0, 0, W, H);
        drawText(result, W / 2, 292, 64, "#f3f4ea", "center", "700");
        drawText("Press R or End Game to return to Loadout.", W / 2, 344, 22, "#b8c0b0", "center");
        button("End Game", W / 2 - 112, 386, 224, 52, endGame, "#5fb3a1");
      }

      function drawGuide() {
        game.buttons = [];
        ctx.fillStyle = "rgba(5, 7, 10, 0.82)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#23262d";
        roundRect(250, 145, 780, 430, 8, true, false);
        ctx.strokeStyle = "#5fb3a1";
        roundRect(250, 145, 780, 430, 8, false, true);
        const lines = guideLines();
        drawText(`${phaseName()} Guide`, 292, 196, 32, "#f3f4ea", "left", "700");
        lines.forEach((line, index) => drawText(line, 292, 260 + index * 36, 20, "#b8c0b0"));
        button("Close", 566, 500, 148, 46, () => { game.guideOpen = false; }, "#5fb3a1");
      }

      function guideLines() {
        if (game.screen === "create") return [
          "Chaos draws freely, Order connects typed points, and Balance mirrors your strokes.",
          "Continuous outlines cost less mana; breaks, crossings, and overlaps carry penalties.",
          "Analyze uses one shared metric system, then Save enters combat."
        ];
        if (game.screen === "loadout") return [
          "Equip saved contracts into the four battle slots.",
          "The big word in each slot is the Call Name used during combat.",
          "Use Start Combat when your loadout has at least one contract."
        ];
        return [
          "Press 1-4 to invoke equipped contracts by slot.",
          "HP, Energy, cooldowns, Buff, Curse, Heal, Energy, and Vitality update in combat.",
          "Opening Guide pauses the combat timer."
        ];
      }

      function drawParticles() {
        for (const particle of game.particles) {
          if (particle.kind !== "sigil") continue;
          ctx.save();
          ctx.globalAlpha = clamp(particle.life * 2, 0, 1);
          ctx.translate(particle.x, particle.y);
          const scale = 0.34 + (0.55 - particle.life) * 0.4;
          drawStoredSigil(particle.sigil, -CONFIG.drawRect.x * scale, -CONFIG.drawRect.y * scale, scale, particle.color, 1, particle.dashed);
          ctx.restore();
        }
      }

      function drawStoredSigil(strokes, ox, oy, scale, color, alpha, dashed = false, configuredLineWidth = null) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.setLineDash(dashed ? CONFIG.creation.drawingRules.dashPattern : []);
        ctx.lineWidth = configuredLineWidth ?? Math.max(2, 4 * scale);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (const stroke of strokes) {
          if (stroke.length < 2) continue;
          ctx.beginPath();
          ctx.moveTo(ox + stroke[0].x * scale, oy + stroke[0].y * scale);
          for (let i = 1; i < stroke.length; i += 1) ctx.lineTo(ox + stroke[i].x * scale, oy + stroke[i].y * scale);
          ctx.stroke();
        }
        ctx.restore();
      }

      function contractCard(contract, x, y, w, h) {
        ctx.fillStyle = "rgba(35, 38, 45, 0.94)";
        roundRect(x, y, w, h, 8, true, false);
        ctx.strokeStyle = CONFIG.typeColors[contract.type];
        roundRect(x, y, w, h, 8, false, true);
        drawText(fullName(contract), x + 16, y + 24, 18, "#f3f4ea", "left", "700");
        drawText(`${contract.type} | Call: ${contract.callName} | ${effectText(contract)} | ${contract.cost} Energy`, x + 16, y + 48, 14, "#b8c0b0");
      }

      function fullName(contract) {
        return `${contract.dragon}'s ${contract.power}`;
      }

      function effectText(contract) {
        if (contract.type === "Damage" || contract.type === "Burst") return `${contract.value} Damage`;
        if (contract.type === "Heal") return `Restore ${contract.value} HP`;
        if (contract.type === "Energy") return `Restore ${contract.value} Energy`;
        if (contract.type === "Vitality") return `+${contract.value} Max HP`;
        return CONFIG.base[contract.type].text;
      }

      function drawMessage() {
        drawText(game.message, 40, 696, 16, "#e8dca8");
      }

      function button(label, x, y, w, h, action, fill = "#2e323b") {
        ctx.fillStyle = fill;
        roundRect(x, y, w, h, 8, true, false);
        ctx.strokeStyle = "#68707a";
        roundRect(x, y, w, h, 8, false, true);
        drawText(label, x + w / 2, y + h / 2 + 1, 15, fill === "#5fb3a1" ? "#101116" : "#f3f4ea", "center", "700", "middle");
        game.buttons.push({ x, y, w, h, action });
      }

      function bar(x, y, w, h, ratio, color) {
        ctx.fillStyle = "#2e323b";
        roundRect(x, y, w, h, 7, true, false);
        ctx.fillStyle = color;
        roundRect(x, y, w * clamp(ratio, 0, 1), h, 7, true, false);
        ctx.strokeStyle = "#68707a";
        roundRect(x, y, w, h, 7, false, true);
      }

      function drawText(text, x, y, size, color, align = "left", weight = "400", baseline = "alphabetic") {
        ctx.fillStyle = color;
        ctx.font = `${weight} ${size}px Segoe UI, Arial, sans-serif`;
        ctx.textAlign = align;
        ctx.textBaseline = baseline;
        ctx.fillText(text, x, y);
        ctx.textBaseline = "alphabetic";
      }

      function roundRect(x, y, w, h, r, fill, stroke) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + radius, y, radius);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
      }

      canvas.addEventListener("pointerdown", (event) => {
        const p = pointFromEvent(event);
        for (let i = game.buttons.length - 1; i >= 0; i -= 1) {
          if (inRect(p, game.buttons[i])) {
            game.buttons[i].action();
            return;
          }
        }
        if (game.screen === "create" && !game.guideOpen) {
          if (game.creationMode === "order") {
            const pointIndex = game.orderPoints.findIndex((point) => Math.hypot(p.x - point.x, p.y - point.y) <= CONFIG.creation.order.hitRadius);
            if (pointIndex !== -1) selectOrderPoint(pointIndex);
          } else {
            beginCreationStroke(p);
          }
        }
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!game.activeStrokes.length) return;
        const p = pointFromEvent(event);
        continueCreationStroke(p);
      });

      window.addEventListener("pointerup", () => {
        endCreationStroke();
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        keys.add(key);
        if (["1", "2", "3", "4"].includes(key)) castSlot(Number(key) - 1);
        if (key === "r") {
          endGame();
        }
        if (key === "g") game.guideOpen = !game.guideOpen;
      });
      window.addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));
      window.addEventListener("resize", fitCanvas);

      window.DragonContractor = {
        CONFIG,
        Creation,
        analyzeCurrentDrawing,
        beginCreationStroke,
        breakOrderStroke,
        continueCreationStroke,
        draw,
        game,
        deleteContract,
        endCreationStroke,
        endGame,
        equipContract,
        makeAnalysis,
        openCreateContract,
        saveContract,
        selectCreationMode,
        selectOrderPoint,
        startCombat
      };

      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      fitCanvas();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
