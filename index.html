<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dragon Fighter</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b1020;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        aspect-ratio: 16 / 9;
        background: #17223a;
        border: 3px solid #f6c453;
        border-radius: 20px;
        box-sizing: border-box;
        box-shadow: 0 20px 70px #0009;
        display: block;
        max-height: 100vh;
        touch-action: none;
        width: min(1100px, 100vw);
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="1100" height="620"></canvas>

    <script>
      (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const cfg = {
          matchTime: 60,
          maxHp: 100,
          baseAttackDamage: 12,
          ultimateDamage: 35,
          enemyDamage: 10,
          attackCd: 1.0,
          defenceCd: 5.0,
          ultimateCd: 9.0,
          baseDefenceTime: 3.0,
          defenceReduce: 0.35,
          enemyMinWait: 1.3,
          enemyMaxWait: 2.4,
          assets: {
            background: "./dragon-fighter-prototype/dragon-fighter/public/assets/backgrounds/arena.png",
            enemy: "./dragon-fighter-prototype/dragon-fighter/public/assets/dragons/moss-boss-dragon-enemy.png"
          },
          facing: {
            player: { flip: true, direction: "left" },
            enemy: { flip: false, direction: "right" }
          },
          elements: {
            ember: { icon: "F", color: "#fb923c" },
            tide: { icon: "D", color: "#60a5fa" },
            moss: { icon: "M", color: "#34d399" },
            enemy: { icon: "M", color: "#a855f7" }
          },
          dragons: [
            {
              id: "ember",
              name: "Ember",
              role: "Attack Focus",
              flavor: "A close-range striker that burns battles down fast.",
              asset: "./dragon-fighter-prototype/dragon-fighter/public/assets/dragons/fire-dragon-adult.png",
              modifiers: {
                attackDamage: 1.2,
                defenceDuration: 0.85,
                skillCooldown: 1
              }
            },
            {
              id: "tide",
              name: "Tide",
              role: "Defence Focus",
              flavor: "A patient guardian that turns pressure into survival.",
              asset: "./dragon-fighter-prototype/dragon-fighter/public/assets/dragons/holy-paladin-dragon-adult.png",
              modifiers: {
                attackDamage: 0.9,
                defenceDuration: 1.25,
                skillCooldown: 1
              }
            },
            {
              id: "moss",
              name: "Moss",
              role: "Balanced",
              flavor: "A steady duelist with reliable rhythm and tempo.",
              asset: "./dragon-fighter-prototype/dragon-fighter/public/assets/dragons/moss-boss-dragon-adult.png",
              modifiers: {
                attackDamage: 1,
                defenceDuration: 1,
                skillCooldown: 0.95
              }
            }
          ],
          dragonSelect: {
            titleY: 70,
            subtitleY: 108,
            cardY: 145,
            cardW: 310,
            cardH: 330,
            cardGap: 30,
            firstCardX: 70,
            imageY: 252,
            imageW: 195,
            imageH: 140,
            confirm: { x: 415, y: 510, w: 270, h: 48 }
          },
          battleLayout: {
            playerDragon: { x: 360, y: 390, w: 358, h: 253, labelY: 226, hitX: 385, hitY: 370 },
            enemyDragon: { x: 766, y: 312, w: 170, h: 124, labelY: 204, hitX: 750, hitY: 300 },
            playerHud: { x: 22, y: 12, w: 390, h: 128 },
            enemyHud: { x: 688, y: 12, w: 390, h: 128 },
            timer: { x: 465, y: 18, w: 170, h: 78 },
            message: { x: 342, y: 144, w: 416, h: 40, textX: 550, textY: 169 },
            mic: { x: 45, y: 168 },
            playerCommand: { x: 28, y: 474, w: 308, h: 58 },
            commandReference: { x: 358, y: 474, w: 384, h: 58 },
            enemyCommand: { x: 764, y: 474, w: 308, h: 58 }
          }
        };

        function getDragonById(config, dragonId) {
          return config.dragons.find((dragon) => dragon.id === dragonId) || null;
        }

        function getSelectedDragon(config, currentState) {
          return getDragonById(config, currentState.selectedDragonId);
        }

        function createInitialState(config) {
          return {
            phase: "select",
            selectedDragonId: null,
            time: config.matchTime,
            playerHp: config.maxHp,
            enemyHp: config.maxHp,
            lastHeard: "-",
            accepted: "-",
            enemyAccepted: "-",
            playerState: "Choose",
            enemyState: "Ready",
            message: "Choose your dragon.",
            note: "Select a dragon, then confirm to battle.",
            result: "",
            cd: { attack: 0, defence: 0, ultimate: 0 },
            defenceTimer: 0,
            enemyTimer: 1.6,
            shake: 0,
            particles: []
          };
        }

        function modifiedAttackDamage(config, currentState) {
          const dragon = getSelectedDragon(config, currentState);
          return Math.round(config.baseAttackDamage * dragon.modifiers.attackDamage);
        }

        function modifiedDefenceDuration(config, currentState) {
          const dragon = getSelectedDragon(config, currentState);
          return config.baseDefenceTime * dragon.modifiers.defenceDuration;
        }

        function modifiedSkillCooldown(config, currentState) {
          const dragon = getSelectedDragon(config, currentState);
          return config.ultimateCd * dragon.modifiers.skillCooldown;
        }

        function getCommandCooldown(config, currentState, command) {
          if (command === "attack") return config.attackCd;
          if (command === "defence") return config.defenceCd;
          if (command === "ultimate") return modifiedSkillCooldown(config, currentState);
          return 0;
        }

        function getBattleRenderData(config, currentState) {
          const selected = getSelectedDragon(config, currentState);
          return {
            player: {
              assetKey: selected.id,
              name: selected.name,
              role: selected.role,
              flip: config.facing.player.flip,
              direction: config.facing.player.direction
            },
            enemy: {
              assetKey: "enemy",
              name: "Enemy Dragon",
              role: "Rival",
              flip: config.facing.enemy.flip,
              direction: config.facing.enemy.direction
            }
          };
        }

        const core = {
          getSelectedDragon,
          modifiedAttackDamage,
          modifiedDefenceDuration,
          getCommandCooldown,
          getBattleRenderData
        };
        const state = createInitialState(cfg);

        const images = {};
        const buttons = [];
        let recognition = null;
        let listening = false;
        let last = performance.now();

        const rand = (a, b) => a + Math.random() * (b - a);
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const log = (name, data = {}) => console.log("[DragonFighter]", name, data);

        function loadImage(key, src) {
          const image = new Image();
          image.onload = () => log("asset_loaded", { key, src });
          image.onerror = () => log("asset_failed", { key, src });
          image.src = src;
          images[key] = image;
        }

        Object.entries(cfg.assets).forEach(([key, src]) => loadImage(key, src));
        cfg.dragons.forEach((dragon) => loadImage(dragon.id, dragon.asset));

        function reset() {
          state.phase = "playing";
          state.time = cfg.matchTime;
          state.playerHp = cfg.maxHp;
          state.enemyHp = cfg.maxHp;
          state.lastHeard = "-";
          state.accepted = "-";
          state.enemyAccepted = "-";
          state.playerState = "Ready";
          state.enemyState = "Ready";
          state.message = "Battle started. Say Attack, Defence, or Ultimate.";
          state.note = "Use canvas buttons, keyboard, or voice commands.";
          state.result = "";
          state.cd.attack = 0;
          state.cd.defence = 0;
          state.cd.ultimate = 0;
          state.defenceTimer = 0;
          state.enemyTimer = rand(cfg.enemyMinWait, cfg.enemyMaxWait);
          state.shake = 0;
          state.particles = [];
          log("reset");
        }

        function chooseDragonAgain() {
          state.phase = "select";
          state.selectedDragonId = null;
          state.time = cfg.matchTime;
          state.playerHp = cfg.maxHp;
          state.enemyHp = cfg.maxHp;
          state.lastHeard = "-";
          state.accepted = "-";
          state.enemyAccepted = "-";
          state.playerState = "Choose";
          state.enemyState = "Ready";
          state.message = "Choose your dragon.";
          state.note = "Select a dragon, then confirm to battle.";
          state.result = "";
          state.cd.attack = 0;
          state.cd.defence = 0;
          state.cd.ultimate = 0;
          state.defenceTimer = 0;
          state.enemyTimer = rand(cfg.enemyMinWait, cfg.enemyMaxWait);
          state.shake = 0;
          state.particles = [];
          log("choose_dragon_again");
        }

        function normalize(text) {
          return String(text || "")
            .toLowerCase()
            .replace(/[.,!?;:]/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        }

        function commandFromSpeech(text) {
          const words = normalize(text).split(" ").filter(Boolean);
          state.lastHeard = words.join(" ") || "-";

          if (words.includes("attack")) return "attack";
          if (words.includes("defence") || words.includes("defense")) return "defence";
          if (words.includes("ultimate")) return "ultimate";
          return null;
        }

        function confirmDragon() {
          const dragon = core.getSelectedDragon(cfg, state);
          if (!dragon) {
            state.note = "Pick a dragon first.";
            return;
          }
          state.phase = "playing";
          state.message = `${dragon.name} enters battle.`;
          state.note = "Use canvas buttons, keyboard, or voice commands.";
          state.playerState = dragon.role;
          state.enemyState = "Ready";
          state.accepted = "-";
          state.enemyAccepted = "-";
          log("dragon_confirmed", { dragonId: dragon.id, role: dragon.role });
        }

        function useCommand(cmd, source = "button") {
          if (state.phase !== "playing") return;

          state.accepted = cmd.toUpperCase();
          log("command", { cmd, source });

          if (state.cd[cmd] > 0) {
            state.message = `${cmd.toUpperCase()} cooldown: ${state.cd[cmd].toFixed(1)}s`;
            state.playerState = "Cooldown";
            return;
          }

          if (cmd === "attack") {
            const damage = core.modifiedAttackDamage(cfg, state);
            state.cd.attack = core.getCommandCooldown(cfg, state, "attack");
            state.enemyHp = clamp(state.enemyHp - damage, 0, cfg.maxHp);
            state.playerState = "Attack";
            state.enemyState = "Hit";
            state.message = `Attack hit. Enemy -${damage} HP`;
            hit(cfg.battleLayout.enemyDragon.hitX, cfg.battleLayout.enemyDragon.hitY, "#fb923c", 18);
            state.shake = 0.15;
          }

          if (cmd === "defence") {
            const duration = core.modifiedDefenceDuration(cfg, state);
            state.cd.defence = core.getCommandCooldown(cfg, state, "defence");
            state.defenceTimer = duration;
            state.playerState = "Defence";
            state.message = `Defence shield active for ${duration.toFixed(1)} seconds`;
            shield(cfg.battleLayout.playerDragon.hitX, cfg.battleLayout.playerDragon.hitY);
          }

          if (cmd === "ultimate") {
            state.cd.ultimate = core.getCommandCooldown(cfg, state, "ultimate");
            state.enemyHp = clamp(state.enemyHp - cfg.ultimateDamage, 0, cfg.maxHp);
            state.playerState = "Ultimate";
            state.enemyState = "Crushed";
            state.message = `Ultimate hit. Enemy -${cfg.ultimateDamage} HP`;
            hit(cfg.battleLayout.enemyDragon.hitX, cfg.battleLayout.enemyDragon.hitY, "#a78bfa", 40);
            state.shake = 0.3;
          }

          checkEnd();
        }

        function toggleMic() {
          if (!recognition) {
            state.note = "This browser does not support Web Speech API. Use canvas buttons or A/D/U/R.";
            return;
          }

          try {
            if (listening) recognition.stop();
            else recognition.start();
          } catch (e) {
            state.note = "Could not start microphone. Reload or use A/D/U.";
          }
        }

        function enemyAttack() {
          if (state.phase !== "playing") return;

          const defended = state.defenceTimer > 0;
          const dmg = Math.round(cfg.enemyDamage * (defended ? cfg.defenceReduce : 1));

          state.playerHp = clamp(state.playerHp - dmg, 0, cfg.maxHp);
          state.enemyState = "Attack";
          state.enemyAccepted = "ATTACK";
          state.playerState = defended ? "Blocked" : "Hit";
          state.message = defended ? `Defence reduced damage. You -${dmg} HP` : `Enemy hit. You -${dmg} HP`;
          hit(cfg.battleLayout.playerDragon.hitX, cfg.battleLayout.playerDragon.hitY, defended ? "#60a5fa" : "#ef4444", defended ? 10 : 18);
          state.shake = 0.16;
          state.enemyTimer = rand(cfg.enemyMinWait, cfg.enemyMaxWait);
          log("enemy_attack", { dmg, defended });
          checkEnd();
        }

        function checkEnd() {
          if (state.playerHp <= 0 && state.enemyHp <= 0) finish("DRAW");
          else if (state.enemyHp <= 0) finish("YOU WIN");
          else if (state.playerHp <= 0) finish("YOU LOSE");
          else if (state.time <= 0) {
            if (state.playerHp > state.enemyHp) finish("YOU WIN BY HP");
            else if (state.enemyHp > state.playerHp) finish("YOU LOSE BY HP");
            else finish("DRAW");
          }
        }

        function finish(result) {
          state.phase = "ended";
          state.result = result;
          state.message = "Choose Dragon Again to pick a new dragon.";
          log("finish", { result, playerHp: state.playerHp, enemyHp: state.enemyHp });
        }

        function hit(x, y, color, count) {
          for (let i = 0; i < count; i += 1) {
            state.particles.push({
              x,
              y,
              vx: rand(-180, 180),
              vy: rand(-150, 150),
              life: rand(0.35, 0.8),
              max: 0.8,
              size: rand(4, 10),
              color
            });
          }
        }

        function shield(x, y) {
          for (let i = 0; i < 28; i += 1) {
            const a = Math.PI * 2 * i / 28;
            state.particles.push({
              x: x + Math.cos(a) * 58,
              y: y + Math.sin(a) * 58,
              vx: Math.cos(a) * 44,
              vy: Math.sin(a) * 44,
              life: 0.75,
              max: 0.75,
              size: 5,
              color: "#60a5fa"
            });
          }
        }

        function update(dt) {
          if (state.shake > 0) state.shake -= dt;
          ["attack", "defence", "ultimate"].forEach((k) => {
            state.cd[k] = Math.max(0, state.cd[k] - dt);
          });

          if (state.defenceTimer > 0) state.defenceTimer = Math.max(0, state.defenceTimer - dt);

          state.particles.forEach((p) => {
            p.life -= dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vx *= 0.98;
            p.vy *= 0.98;
          });
          state.particles = state.particles.filter((p) => p.life > 0);

          if (state.phase !== "playing") return;

          state.time = Math.max(0, state.time - dt);
          state.enemyTimer -= dt;

          if (state.enemyTimer <= 0) enemyAttack();
          if (state.time <= 0) checkEnd();
        }

        function rr(x, y, w, h, r, fill, stroke) {
          ctx.beginPath();
          ctx.roundRect(x, y, w, h, r);
          if (fill) {
            ctx.fillStyle = fill;
            ctx.fill();
          }
          if (stroke) {
            ctx.strokeStyle = stroke;
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }

        function hpBar(x, y, w, h, value, color, label) {
          rr(x, y, w, h, 10, "#0008", "#ffffff33");
          rr(x + 3, y + 3, (w - 6) * clamp(value / cfg.maxHp, 0, 1), h - 6, 8, color, null);
          ctx.textAlign = "center";
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 16px system-ui";
          ctx.fillText(`${label}: ${Math.ceil(value)}/${cfg.maxHp}`, x + w / 2, y + h - 8);
          ctx.textAlign = "left";
        }

        function canvasButton(id, x, y, w, h, label, fill, border) {
          buttons.push({ id, x, y, w, h });
          rr(x, y, w, h, 18, fill, border);
          ctx.textAlign = "center";
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 15px system-ui";
          ctx.fillText(label, x + w / 2, y + 27);
          ctx.textAlign = "left";
        }

        function drawControls() {
          if (state.phase === "select") {
            const select = cfg.dragonSelect;
            canvasButton("confirmDragon", select.confirm.x, select.confirm.y, select.confirm.w, select.confirm.h, "Confirm Dragon", state.selectedDragonId ? "#f6c453dd" : "#475569cc", state.selectedDragonId ? "#f6c453" : "#64748b");
            ctx.textAlign = "center";
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "14px system-ui";
            ctx.fillText(state.note, 550, 610);
            ctx.textAlign = "left";
            return;
          }

          buttons.length = 0;
          if (state.phase === "ended") {
            canvasButton("chooseDragonAgain", 451, 548, 198, 44, "Choose Dragon Again", "#102a4cdd", "#87d5ff");
            ctx.textAlign = "center";
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "14px system-ui";
            ctx.fillText(state.note, 550, 610);
            ctx.textAlign = "left";
            return;
          }

          canvasButton("mic", 110, 548, 150, 44, listening ? "Stop Mic" : "Start Mic", listening ? "#164e35dd" : "#f6c453dd", "#f6c453");
          canvasButton("attack", 286, 548, 120, 44, "Attack", "#402313dd", "#fb923c");
          canvasButton("defence", 432, 548, 120, 44, "Defence", "#16324add", "#60a5fa");
          canvasButton("ultimate", 578, 548, 120, 44, "Ultimate", "#30215bdd", "#a78bfa");
          canvasButton("restart", 844, 548, 148, 44, "Restart", "#102a4cdd", "#87d5ff");

          ctx.textAlign = "center";
          ctx.fillStyle = "#cbd5e1";
          ctx.font = "14px system-ui";
          ctx.fillText(state.note, 550, 610);
          ctx.textAlign = "left";
        }

        function drawDragonSelect() {
          buttons.length = 0;
          drawArena();
          ctx.fillStyle = "#020617aa";
          ctx.fillRect(0, 0, 1100, 620);

          const select = cfg.dragonSelect;
          ctx.textAlign = "center";
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 42px system-ui";
          ctx.fillText("Choose Your Dragon", 550, select.titleY);
          ctx.fillStyle = "#cbd5e1";
          ctx.font = "18px system-ui";
          ctx.fillText("Each role changes Attack, Defence, or Skill timing in battle.", 550, select.subtitleY);

          cfg.dragons.forEach((dragon, index) => {
            const x = select.firstCardX + index * (select.cardW + select.cardGap);
            const selected = state.selectedDragonId === dragon.id;
            buttons.push({ id: `select:${dragon.id}`, x, y: select.cardY, w: select.cardW, h: select.cardH });
            rr(x, select.cardY, select.cardW, select.cardH, 20, selected ? "#1f2937f2" : "#0f172adf", selected ? "#f6c453" : "#ffffff33");
            drawDragonImage(dragon.id, x + select.cardW / 2, select.imageY, select.imageW, select.imageH, cfg.facing.player.flip);
            ctx.fillStyle = "#fff4d6";
            ctx.font = "bold 25px system-ui";
            ctx.fillText(dragon.name, x + select.cardW / 2, select.cardY + 165);
            ctx.fillStyle = selected ? "#f6c453" : "#93c5fd";
            ctx.font = "bold 17px system-ui";
            ctx.fillText(dragon.role, x + select.cardW / 2, select.cardY + 193);
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "14px system-ui";
            wrapText(dragon.flavor, x + select.cardW / 2, select.cardY + 224, select.cardW - 46, 18);
            ctx.fillStyle = "#bbf7d0";
            ctx.font = "bold 13px system-ui";
            ctx.fillText(`ATK x${dragon.modifiers.attackDamage}  DEF x${dragon.modifiers.defenceDuration}  SKILL x${dragon.modifiers.skillCooldown}`, x + select.cardW / 2, select.cardY + 300);
          });

          const selectedDragon = core.getSelectedDragon(cfg, state);
          state.note = selectedDragon ? `${selectedDragon.name}: ${selectedDragon.role}` : state.note;
          drawControls();
          ctx.textAlign = "left";
        }

        function wrapText(text, x, y, maxWidth, lineHeight) {
          const words = text.split(" ");
          let line = "";
          words.forEach((word) => {
            const next = line ? `${line} ${word}` : word;
            if (ctx.measureText(next).width > maxWidth && line) {
              ctx.fillText(line, x, y);
              line = word;
              y += lineHeight;
            } else {
              line = next;
            }
          });
          if (line) ctx.fillText(line, x, y);
        }

        function fallbackDragon(x, y, flip, body, wing, horn) {
          ctx.save();
          ctx.translate(x, y);
          if (flip) ctx.scale(-1, 1);
          ctx.fillStyle = "#0005";
          ctx.beginPath();
          ctx.ellipse(0, 72, 92, 23, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = wing;
          ctx.strokeStyle = "#0008";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(-25, 5);
          ctx.lineTo(-115, -70);
          ctx.lineTo(-85, 35);
          ctx.closePath();
          ctx.moveTo(28, 5);
          ctx.lineTo(100, -55);
          ctx.lineTo(80, 35);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = body;
          ctx.beginPath();
          ctx.ellipse(0, 18, 55, 72, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.ellipse(50, -40, 48, 37, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = horn;
          ctx.beginPath();
          ctx.moveTo(34, -72);
          ctx.lineTo(14, -112);
          ctx.lineTo(55, -80);
          ctx.closePath();
          ctx.moveTo(68, -70);
          ctx.lineTo(98, -100);
          ctx.lineTo(82, -56);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#111827";
          ctx.beginPath();
          ctx.arc(66, -48, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawDragonImage(key, x, y, w, h, flip) {
          const image = images[key];

          if (!image || !image.complete || image.naturalWidth === 0) {
            fallbackDragon(x, y, flip, key !== "enemy" ? "#d6a44c" : "#a855f7", key !== "enemy" ? "#8b5a2b" : "#6d28d9", key !== "enemy" ? "#f3d179" : "#fca5a5");
            return;
          }

          ctx.save();
          ctx.translate(x, y);
          if (flip) ctx.scale(-1, 1);
          ctx.fillStyle = "#0005";
          ctx.beginPath();
          ctx.ellipse(0, h * 0.42, w * 0.42, 23, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.drawImage(image, -w / 2, -h / 2, w, h);
          if (key !== "enemy" && state.defenceTimer > 0) {
            ctx.strokeStyle = "#60a5facc";
            ctx.lineWidth = 7;
            ctx.beginPath();
            ctx.arc(0, 0, Math.max(w, h) * 0.55, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawElementIcon(x, y, key) {
          const element = cfg.elements[key] || cfg.elements.enemy;
          ctx.fillStyle = element.color;
          ctx.beginPath();
          ctx.arc(x, y, 15, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#fff8";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.textAlign = "center";
          ctx.fillStyle = "#07101d";
          ctx.font = "bold 13px system-ui";
          ctx.fillText(element.icon, x, y + 5);
          ctx.textAlign = "left";
        }

        function miniCooldown(x, y, label, value, max, color) {
          const ready = value <= 0;
          rr(x, y, 92, 20, 8, ready ? "#123326dd" : "#3b2230dd", color);
          ctx.textAlign = "center";
          ctx.fillStyle = ready ? "#bbf7d0" : "#fecaca";
          ctx.font = "bold 10px system-ui";
          ctx.fillText(ready ? `${label} READY` : `${label} ${value.toFixed(1)}s`, x + 46, y + 14);
          if (!ready) {
            ctx.fillStyle = "#0005";
            ctx.fillRect(x + 4, y + 4, 84 * clamp(value / max, 0, 1), 12);
          }
          ctx.textAlign = "left";
        }

        function drawPanelCooldowns(layout, side) {
          const y = layout.y + 101;
          if (side === "player") {
            miniCooldown(layout.x + 22, y, "ATK", state.cd.attack, cfg.attackCd, "#fb923c");
            miniCooldown(layout.x + 121, y, "DEF", state.cd.defence, cfg.defenceCd, "#60a5fa");
            miniCooldown(layout.x + 220, y, "ULT", state.cd.ultimate, cfg.ultimateCd, "#a78bfa");
            return;
          }

          miniCooldown(layout.x + 22, y, "ATK", state.enemyTimer, cfg.enemyMaxWait, "#fb923c");
          miniCooldown(layout.x + 121, y, "DEF", 0, cfg.defenceCd, "#60a5fa");
          miniCooldown(layout.x + 220, y, "ULT", 0, cfg.ultimateCd, "#a78bfa");
        }

        function drawStatusPanel(layout, title, subtitle, hp, color, elementKey) {
          rr(layout.x, layout.y, layout.w, layout.h, 18, "#07101dcc", "#ffffff22");
          drawElementIcon(layout.x + 26, layout.y + 34, elementKey);
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 24px system-ui";
          ctx.fillText(title, layout.x + 48, layout.y + 36);
          ctx.fillStyle = "#cbd5e1";
          ctx.font = "14px system-ui";
          ctx.fillText(subtitle, layout.x + 23, layout.y + 96);
          hpBar(layout.x + 23, layout.y + 50, layout.w - 60, 32, hp, color, "HP");
        }

        function drawStateLabel(text, x, y) {
          ctx.textAlign = "center";
          ctx.fillStyle = "#07101dd9";
          ctx.strokeStyle = "#f6c45377";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(x - 74, y - 24, 148, 34, 14);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 18px system-ui";
          ctx.fillText(text, x, y);
          ctx.textAlign = "left";
        }

        function drawCommandPanel(layout, title, value, align = "center") {
          rr(layout.x, layout.y, layout.w, layout.h, 18, "#07101dcc", "#f6c45366");
          ctx.textAlign = align;
          const textX = align === "left" ? layout.x + 20 : align === "right" ? layout.x + layout.w - 20 : layout.x + layout.w / 2;
          ctx.fillStyle = "#93c5fd";
          ctx.font = "bold 12px system-ui";
          ctx.fillText(title, textX, layout.y + 20);
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 18px system-ui";
          ctx.fillText(value, textX, layout.y + 44);
          ctx.textAlign = "left";
        }

        function drawArena() {
          const bg = images.background;

          if (bg && bg.complete && bg.naturalWidth > 0) {
            ctx.drawImage(bg, 0, 0, 1100, 620);
            ctx.fillStyle = "#02061755";
            ctx.fillRect(0, 0, 1100, 620);
            return;
          }

          const g = ctx.createLinearGradient(0, 0, 0, 620);
          g.addColorStop(0, "#263a5b");
          g.addColorStop(0.6, "#17233a");
          g.addColorStop(1, "#0b1020");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, 1100, 620);
          ctx.fillStyle = "#f6c45318";
          ctx.beginPath();
          ctx.ellipse(550, 350, 445, 115, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#f6c45355";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(550, 350, 455, 122, 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        function draw() {
          if (state.phase === "select") {
            drawDragonSelect();
            return;
          }

          ctx.save();
          if (state.shake > 0) ctx.translate(rand(-6, 6), rand(-5, 5));

          drawArena();
          const renderData = core.getBattleRenderData(cfg, state);
          const layout = cfg.battleLayout;
          drawDragonImage(renderData.enemy.assetKey, layout.enemyDragon.x, layout.enemyDragon.y, layout.enemyDragon.w, layout.enemyDragon.h, renderData.enemy.flip);
          drawDragonImage(renderData.player.assetKey, layout.playerDragon.x, layout.playerDragon.y, layout.playerDragon.w, layout.playerDragon.h, renderData.player.flip);

          state.particles.forEach((p) => {
            ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          });

          drawStatusPanel(layout.playerHud, `P1 ${renderData.player.name}`, renderData.player.role, state.playerHp, "#34d399", state.selectedDragonId);
          drawStatusPanel(layout.enemyHud, "P2 Enemy Dragon", "AI Rival", state.enemyHp, "#ef4444", "enemy");
          drawPanelCooldowns(layout.playerHud, "player");
          drawPanelCooldowns(layout.enemyHud, "enemy");

          rr(layout.timer.x, layout.timer.y, layout.timer.w, layout.timer.h, 18, "#07101de0", "#f6c45388");
          ctx.textAlign = "center";
          ctx.fillStyle = "#f6c453";
          ctx.font = "bold 17px system-ui";
          ctx.fillText("TIME", layout.timer.x + layout.timer.w / 2, layout.timer.y + 27);
          ctx.font = "bold 32px system-ui";
          ctx.fillText(String(Math.ceil(state.time)), layout.timer.x + layout.timer.w / 2, layout.timer.y + 62);
          ctx.textAlign = "left";

          drawStateLabel(state.enemyState, layout.enemyDragon.x, layout.enemyDragon.labelY);
          drawStateLabel(state.playerState, layout.playerDragon.x, layout.playerDragon.labelY);

          ctx.fillStyle = listening ? "#34d399" : "#fca5a5";
          ctx.font = "bold 16px system-ui";
          ctx.fillText(listening ? "Mic listening" : "Mic off", layout.mic.x, layout.mic.y);

          rr(layout.message.x, layout.message.y, layout.message.w, layout.message.h, 18, "#07101dd9", "#f6c45366");
          ctx.textAlign = "center";
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 21px system-ui";
          ctx.fillText(state.message, layout.message.textX, layout.message.textY);
          ctx.textAlign = "left";

          drawCommandPanel(layout.playerCommand, "P1 COMMAND", state.accepted, "left");
          drawCommandPanel(layout.commandReference, "COMMANDS", "Attack  |  Defence  |  Ultimate");
          drawCommandPanel(layout.enemyCommand, "P2 / AI COMMAND", state.enemyAccepted, "right");

          if (state.phase === "ended") {
            ctx.fillStyle = "#020617b8";
            ctx.fillRect(0, 0, 1100, 620);
            rr(275, 175, 550, 250, 26, "#0f172af2", "#f6c453dd");
            ctx.textAlign = "center";
            ctx.font = "bold 44px system-ui";
            ctx.fillStyle = state.phase === "ended" ? state.result.includes("WIN") ? "#34d399" : state.result.includes("LOSE") ? "#ef4444" : "#f6c453" : "#fff4d6";
            ctx.fillText(state.result, 550, 250);
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "20px system-ui";
            ctx.fillText("Say: Attack, Defence, Ultimate", 550, 305);
            ctx.fillText("Or use canvas buttons / keys A, D, U", 550, 340);
            ctx.fillStyle = "#f6c453";
            ctx.font = "bold 21px system-ui";
            ctx.fillText("Choose Dragon Again", 550, 385);
            ctx.textAlign = "left";
          }

          drawControls();

          ctx.restore();
        }

        function loop(now) {
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          update(dt);
          draw();
          requestAnimationFrame(loop);
        }

        function setupSpeech() {
          if (!SpeechRecognition) {
            state.note = "This browser does not support Web Speech API. Use canvas buttons or A/D/U/R.";
            return;
          }

          recognition = new SpeechRecognition();
          recognition.lang = "en-US";
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.maxAlternatives = 1;

          recognition.onstart = () => {
            listening = true;
            state.note = "Listening. Say Attack / Defence / Ultimate.";
            log("mic_start");
          };

          recognition.onend = () => {
            listening = false;
            state.note = "Mic is off. Press Start Mic to listen again.";
            log("mic_end");
          };

          recognition.onerror = (e) => {
            state.note = `Mic error: ${e.error}. Use canvas buttons or A/D/U.`;
            log("mic_error", { error: e.error });
          };

          recognition.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; i += 1) {
              const text = e.results[i][0].transcript;
              state.lastHeard = normalize(text) || "-";

              if (e.results[i].isFinal) {
                const cmd = commandFromSpeech(text);
                log("speech_final", { text, cmd });
                if (cmd) useCommand(cmd, "voice");
                else state.message = "Not recognized. Say Attack, Defence, or Ultimate.";
              }
            }
          };

          state.note = "Voice is supported. Press Start Mic to play.";
        }

        canvas.addEventListener("pointerup", (e) => {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          const x = (e.clientX - rect.left) * scaleX;
          const y = (e.clientY - rect.top) * scaleY;
          const button = buttons.find((item) => x >= item.x && x <= item.x + item.w && y >= item.y && y <= item.y + item.h);

          if (!button) return;
          if (button.id.startsWith("select:")) {
            state.selectedDragonId = button.id.slice("select:".length);
            const dragon = core.getSelectedDragon(cfg, state);
            state.message = `${dragon.name} selected.`;
            state.note = `${dragon.role}: Attack x${dragon.modifiers.attackDamage}, Defence x${dragon.modifiers.defenceDuration}, Skill x${dragon.modifiers.skillCooldown}`;
          }
          if (button.id === "confirmDragon") confirmDragon();
          if (button.id === "mic") toggleMic();
          if (button.id === "attack") useCommand("attack", "canvas");
          if (button.id === "defence") useCommand("defence", "canvas");
          if (button.id === "ultimate") useCommand("ultimate", "canvas");
          if (button.id === "restart") reset();
          if (button.id === "chooseDragonAgain") chooseDragonAgain();
        });

        window.addEventListener("keydown", (e) => {
          const k = e.key.toLowerCase();
          if (state.phase === "select" && k === "enter") confirmDragon();
          if (k === "a") useCommand("attack", "keyboard");
          if (k === "d") useCommand("defence", "keyboard");
          if (k === "u") useCommand("ultimate", "keyboard");
          if (k === "r") reset();
        });

        setupSpeech();
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
